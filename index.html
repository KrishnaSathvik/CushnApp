<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description"
    content="Find out what your subscriptions really cost. Cushn surfaces hidden spend, flags waste, and reminds you before renewals hit." />
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="Cushn | Subscription intelligence that finds your waste" />
  <meta property="og:description"
    content="Find out what your subscriptions really cost. Cushn surfaces hidden spend, flags waste, and reminds you before renewals hit." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cushn | Subscription intelligence that finds your waste" />
  <meta name="twitter:description"
    content="Find out what your subscriptions really cost. Cushn surfaces hidden spend, flags waste, and reminds you before renewals hit." />
  <meta name="twitter:image" content="/og-image.png" />
  <title>Cushn | Your spending cushion</title>
  <script>
    (function () {
      var themePreference = localStorage.getItem('cushn_theme') || localStorage.getItem('subtrackr_theme') || 'system';
      var systemPrefersDark = typeof window.matchMedia === 'function'
        ? window.matchMedia('(prefers-color-scheme: dark)').matches
        : true;
      var theme = themePreference === 'system'
        ? (systemPrefersDark ? 'dark' : 'light')
        : themePreference;
      var isLight = theme === 'light';
      var bg = isLight ? '#ffffff' : '#000000';
      var fg = isLight ? 'rgba(0, 0, 0, 0.88)' : 'rgba(255, 255, 255, 0.92)';
      var themeColor = document.querySelector('meta[name="theme-color"]');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.backgroundColor = bg;
      document.documentElement.style.color = fg;
      if (themeColor) themeColor.setAttribute('content', bg);
      document.addEventListener('DOMContentLoaded', function () {
        if (!document.body) return;
        document.body.style.backgroundColor = bg;
        document.body.style.color = fg;
      });
    })();
  </script>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (window.__cushnReloadingForUpdate) return;
        window.__cushnReloadingForUpdate = true;
        window.location.reload();
      });
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
